<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taktiksel Manga Yönetim Simülasyonu — Teknik İnceleme Raporu</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Markdown & Mermaid CDN -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            mil: {
              bg: '#0A0E17',
              panel: '#0E1626',
              green: '#22C55E',
              red: '#EF4444',
              cyan: '#00FFFF',
              yellow: '#EAB308',
              border: 'rgba(34, 197, 94, 0.2)',
            }
          }
        }
      }
    }
  </script>
  
  <style>
    body {
      background-color: #0A0E17;
      color: #E2E8F0;
    }
    
    /* Markdown Styles */
    .prose h1 {
      font-size: 2.25rem;
      font-weight: 800;
      color: #FFFFFF;
      border-bottom: 2px solid rgba(34, 197, 94, 0.3);
      padding-bottom: 0.5rem;
      margin-top: 2rem;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: -0.025em;
    }
    .prose h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #EAB308; /* Yellow */
      margin-top: 1.75rem;
      margin-bottom: 0.75rem;
      border-left: 4px solid #EAB308;
      padding-left: 0.75rem;
    }
    .prose h3 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #00FFFF; /* Cyan */
      margin-top: 1.25rem;
      margin-bottom: 0.5rem;
    }
    .prose p {
      margin-bottom: 1rem;
      line-height: 1.75;
      color: #CBD5E1;
    }
    .prose ul {
      list-style-type: disc;
      padding-left: 1.5rem;
      margin-bottom: 1rem;
    }
    .prose li {
      margin-bottom: 0.5rem;
      color: #CBD5E1;
    }
    .prose code {
      font-family: 'JetBrains Mono', monospace;
      background-color: rgba(34, 197, 94, 0.1);
      color: #22C55E;
      padding: 0.125rem 0.25rem;
      border-radius: 0.25rem;
      font-size: 0.875rem;
    }
    .prose pre {
      background-color: #0F172A;
      border: 1px solid rgba(34, 197, 94, 0.2);
      padding: 1rem;
      border-radius: 0.375rem;
      overflow-x: auto;
      margin-bottom: 1.5rem;
    }
    .prose pre code {
      background-color: transparent;
      color: #E2E8F0;
      padding: 0;
    }
    .prose table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
    }
    .prose th {
      background-color: rgba(34, 197, 94, 0.1);
      color: #22C55E;
      font-weight: 600;
      text-align: left;
      padding: 0.75rem;
      border: 1px solid rgba(34, 197, 94, 0.2);
    }
    .prose td {
      padding: 0.75rem;
      border: 1px solid rgba(34, 197, 94, 0.2);
      color: #E2E8F0;
    }
    
    /* Print specific styling */
    @media print {
      body {
        background-color: #FFFFFF !important;
        color: #000000 !important;
      }
      .no-print {
        display: none !important;
      }
      .print-container {
        max-width: 100% !important;
        padding: 0 !important;
        box-shadow: none !important;
        background-color: #FFFFFF !important;
      }
      .prose h1 {
        color: #000000 !important;
        border-bottom: 2px solid #000000 !important;
      }
      .prose h2 {
        color: #000000 !important;
        border-left: 4px solid #000000 !important;
      }
      .prose h3 {
        color: #000000 !important;
      }
      .prose p, .prose li, .prose td {
        color: #000000 !important;
      }
      .prose code {
        background-color: #F1F5F9 !important;
        color: #000000 !important;
        border: 1px solid #CBD5E1 !important;
      }
      .prose pre {
        background-color: #F8FAFC !important;
        border: 1px solid #CBD5E1 !important;
      }
      .prose pre code {
        color: #000000 !important;
      }
      .prose th {
        background-color: #F1F5F9 !important;
        color: #000000 !important;
        border: 1px solid #CBD5E1 !important;
      }
      .prose td {
        border: 1px solid #CBD5E1 !important;
      }
    }
  </style>
</head>
<body class="font-sans antialiased min-h-screen pb-12">

  <!-- Floating action bar -->
  <div class="no-print sticky top-0 bg-[#0E1626]/90 backdrop-blur border-b border-mil-border z-50 px-6 py-4 flex items-center justify-between shadow-lg">
    <div class="flex items-center gap-2">
      <span class="text-mil-green font-black tracking-widest text-sm">⚔️ TACTICAL SIMULATION REPORT</span>
    </div>
    <div class="flex items-center gap-4">
      <a href="/project_analysis.md" target="_blank" class="text-xs text-slate-400 hover:text-white transition-colors uppercase font-mono">MD DOSYASI</a>
      <button 
        onclick="window.print()" 
        class="bg-mil-green hover:bg-green-600 text-mil-bg font-bold px-4 py-2 rounded shadow-[0_0_15px_rgba(34,197,94,0.3)] transition-all text-sm uppercase tracking-wider"
      >
        📄 PDF OLARAK KAYDET / YAZDIR
      </button>
    </div>
  </div>

  <!-- Main Content Container -->
  <div class="print-container max-w-4xl mx-auto mt-8 p-8 bg-mil-panel border border-mil-border shadow-2xl rounded-lg">
    <div id="content" class="prose max-w-none">
      <div class="text-center py-12">
        <span class="text-mil-green animate-pulse">Rapor Yükleniyor...</span>
      </div>
    </div>
  </div>

  <script>
    // Initialize Mermaid
    mermaid.initialize({
      startOnLoad: false,
      theme: 'dark',
      securityLevel: 'loose',
      flowchart: {
        useMaxWidth: true,
        htmlLabels: true
      }
    });

    // Load and Render Markdown
    fetch('/project_analysis.md')
      .then(response => response.text())
      .then(markdown => {
        // Render markdown
        const html = marked.parse(markdown);
        document.getElementById('content').innerHTML = html;
        
        // Render Mermaid diagrams
        const mermaidBlocks = document.querySelectorAll('pre code.language-mermaid');
        mermaidBlocks.forEach((block, index) => {
          const rawCode = block.textContent;
          const preElement = block.parentElement;
          const div = document.createElement('div');
          div.className = 'mermaid my-6 flex justify-center bg-[#070B12] p-4 rounded border border-mil-border/50';
          div.id = 'mermaid-' + index;
          div.textContent = rawCode;
          preElement.parentNode.replaceChild(div, preElement);
        });
        
        // Trigger Mermaid rendering
        mermaid.init(undefined, '.mermaid');
      })
      .catch(error => {
        console.error('Markdown loading error:', error);
        document.getElementById('content').innerHTML = `
          <div class="text-center py-12 text-mil-red">
            <strong>Hata:</strong> Rapor dosyası yüklenemedi. 
          </div>
        `;
      });
  </script>
</body>
</html>
